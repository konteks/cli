name: check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🥟 Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.12

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build
        run: bun run build

      - name: 🎨 Format
        run: bun run format

      - name: 🔎 Analyze dependencies
        run: bunx knip -n --reporter compact

      - name: 🧪 Typecheck
        run: bunx tsc --noEmit --pretty false

      - name: ✅ Test
        run: bun test
