name: 🚀 Release

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    outputs:
      npm_tag: ${{ steps.release.outputs.npm_tag }}
      package_file: ${{ steps.pack.outputs.package_file }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🥟 Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.12

      - name: 📦 Set up npm
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: 🏷️ Resolve release tag
        id: release
        shell: bash
        run: |
          release_tag="${GITHUB_REF_NAME}"

          if [[ ! "$release_tag" =~ ^v ]]; then
            echo "Release tag must start with v, got: $release_tag" >&2
            exit 1
          fi

          version="${release_tag#v}"

          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            npm_tag="latest"
          elif [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-([0-9A-Za-z-]+)\.[0-9]+$ ]]; then
            npm_tag="${BASH_REMATCH[1]}"
          else
            echo "Release tag must match vx.x.x or vx.x.x-{tag}.x, got: $release_tag" >&2
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "npm_tag=$npm_tag" >> "$GITHUB_OUTPUT"

      - name: 🔢 Set package version
        shell: bash
        run: |
          npm version "${{ steps.release.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: 📚 Install dependencies
        run: bun install --frozen-lockfile

      - name: ✅ Run check
        run: bun run check

      - name: 📦 Pack package
        id: pack
        shell: bash
        run: |
          package_file="konteks-cli-${{ steps.release.outputs.version }}.tgz"
          npm pack
          echo "package_file=$package_file" >> "$GITHUB_OUTPUT"

      - name: ⬆️ Upload package artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: npm-package
          path: ${{ steps.pack.outputs.package_file }}
          if-no-files-found: error

  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: 📦 Set up npm
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: ⬇️ Download package artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: npm-package

      - name: 🚢 Publish to npm
        run: npm publish "${{ needs.build.outputs.package_file }}" --tag "${{ needs.build.outputs.npm_tag }}"
